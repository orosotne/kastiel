<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BC7D"/>
      <stop offset="50%" style="stop-color:#C9A962"/>
      <stop offset="100%" style="stop-color:#B8954A"/>
    </linearGradient>
  </defs>
  
  <!-- Optional Background for visibility on all themes, can be removed for transparency -->
  <!-- <rect width="512" height="512" rx="100" fill="#1A1A1A"/> -->
  
  <!-- Castle Silhouette -->
  <g transform="translate(106, 106) scale(0.6)">
    <!-- Base -->
    <path d="M50 450 L450 450 L450 400 L50 400 Z" fill="url(#goldGradient)"/>
    
    <!-- Main Structure -->
    <path d="M100 400 L100 200 L400 200 L400 400 Z" fill="url(#goldGradient)"/>
    
    <!-- Towers -->
    <path d="M80 200 L80 100 L140 100 L140 200 Z" fill="url(#goldGradient)"/>
    <path d="M360 200 L360 100 L420 100 L420 200 Z" fill="url(#goldGradient)"/>
    
    <!-- Roofs -->
    <path d="M70 100 L110 40 L150 100 Z" fill="url(#goldGradient)"/>
    <path d="M350 100 L390 40 L430 100 Z" fill="url(#goldGradient)"/>
    
    <!-- Central Tower/Gate -->
    <path d="M200 200 L200 150 L300 150 L300 200 Z" fill="url(#goldGradient)"/>
    <path d="M220 400 L220 300 C220 280 280 280 280 300 L280 400 Z" fill="#1A1A1A"/> <!-- Gate opening -->
    
    <!-- Windows -->
    <rect x="180" y="250" width="30" height="40" rx="15" fill="#1A1A1A"/>
    <rect x="290" y="250" width="30" height="40" rx="15" fill="#1A1A1A"/>
  </g>
</svg>